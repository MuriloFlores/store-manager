basePath: /
definitions:
  store-manager_internal_application_DTOs.CreateProductDTO:
    properties:
      name:
        type: string
      quantity:
        type: integer
      value:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
    type: object
  store-manager_internal_application_DTOs.CreateRawMaterialDTO:
    properties:
      cost:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
      name:
        type: string
      quantity:
        type: integer
      risk_limit:
        type: integer
      unit:
        $ref: '#/definitions/store-manager_internal_domain_entity.Unit'
    type: object
  store-manager_internal_application_DTOs.ErrorResponse:
    properties:
      code:
        type: integer
      message:
        type: string
    type: object
  store-manager_internal_application_DTOs.FindAssocByCriteriaDTO:
    properties:
      criteria:
        type: string
      info: {}
    type: object
  store-manager_internal_application_DTOs.FindProductAssocRawMaterialDTO:
    properties:
      material_ids:
        items:
          type: string
        type: array
      product_ids:
        items:
          type: string
        type: array
    type: object
  store-manager_internal_application_DTOs.FindRawMaterialDTO:
    properties:
      id:
        type: string
    type: object
  store-manager_internal_application_DTOs.MoneyDTO:
    properties:
      currency_code:
        type: string
      total_cents:
        type: integer
    type: object
  store-manager_internal_application_DTOs.ProductAssocRawMaterialDTO:
    properties:
      activated:
        type: boolean
      material_id:
        type: string
      product_id:
        type: string
      quantity_used:
        type: integer
    type: object
  store-manager_internal_application_DTOs.ProductDTO:
    properties:
      id:
        type: string
      name:
        type: string
      production_cost:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
      quantity:
        type: integer
      raw_materials:
        items:
          $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
        type: array
      value:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
    type: object
  store-manager_internal_application_DTOs.RawMaterialDTO:
    properties:
      cost:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
      id:
        type: string
      name:
        type: string
      quantity:
        type: integer
      risk_limit:
        type: integer
      unit:
        $ref: '#/definitions/store-manager_internal_domain_entity.Unit'
    type: object
  store-manager_internal_application_DTOs.UpdateProductDTO:
    properties:
      id:
        type: string
      name:
        type: string
      quantity:
        type: integer
      value:
        $ref: '#/definitions/store-manager_internal_application_DTOs.MoneyDTO'
    type: object
  store-manager_internal_domain_entity.Unit:
    enum:
    - kilo
    - litro
    - unidade
    - caixa
    - gramas
    type: string
    x-enum-varnames:
    - Kilograms
    - Liters
    - Each
    - Boxes
    - Grams
host: localhost:8080
info:
  contact: {}
  description: API para gerenciar lojas.
  title: Store Manager API
  version: "1.0"
paths:
  /assoc-product-material/delete-by-ids:
    delete:
      consumes:
      - application/json
      description: Deleta associações com base nos IDs de produtos e matérias-primas.
      parameters:
      - description: Critérios para deletar associações
        in: body
        name: criteria
        required: true
        schema:
          $ref: '#/definitions/store-manager_internal_application_DTOs.FindProductAssocRawMaterialDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Deletar Associações
      tags:
      - Associações
  /assoc-product-material/get-all:
    get:
      description: Recupera todas as associações entre produtos e matérias-primas
        e retorna os produtos enriquecidos.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Obter Todas as Associações
      tags:
      - Associações
  /assoc-product-material/get-by-criteria:
    get:
      consumes:
      - application/json
      description: Recupera associações com base nos critérios e informações fornecidos.
      parameters:
      - description: Critérios para buscar associações
        in: body
        name: criteria
        required: true
        schema:
          $ref: '#/definitions/store-manager_internal_application_DTOs.FindAssocByCriteriaDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Buscar Associações por Critério
      tags:
      - Associações
  /assoc-product-material/get-by-ids:
    get:
      consumes:
      - application/json
      description: Recupera associações com base no DTO fornecido.
      parameters:
      - description: DTO de associação para buscar associações
        in: body
        name: association
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ProductAssocRawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Buscar Associação por ID
      tags:
      - Associações
  /assoc-product-material/insert:
    post:
      consumes:
      - application/json
      description: Cria associações entre produtos e matérias-primas.
      parameters:
      - description: Array de associações a serem criadas
        in: body
        name: associations
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ProductAssocRawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Criar Associações
      tags:
      - Associações
  /assoc-product-material/update:
    put:
      consumes:
      - application/json
      description: Atualiza as associações e retorna os produtos atualizados com as
        matérias-primas associadas.
      parameters:
      - description: Array de associações para atualizar
        in: body
        name: associations
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ProductAssocRawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Atualizar Associações
      tags:
      - Associações
  /products/delete-by-ids:
    delete:
      consumes:
      - application/json
      description: Remove vários Produtos do sistema utilizando seus IDs.
      parameters:
      - description: Lista de IDs dos Produtos a serem deletados
        in: body
        name: ids
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Deletar Produtos por IDs
      tags:
      - Produtos
  /products/get-all:
    get:
      consumes:
      - application/json
      description: Retorna todos os Produtos cadastrados no sistema.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Listar todos os Produtos
      tags:
      - Produtos
  /products/get-by-ids:
    get:
      consumes:
      - application/json
      description: Recupera Produtos utilizando uma lista de IDs.
      parameters:
      - default: 8effac39-9d4d-4b20-851c-68cf0d8aae60
        description: IDs dos Produtos (separados por vírgula)
        in: query
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Buscar Produtos por IDs
      tags:
      - Produtos
  /products/insert:
    post:
      consumes:
      - application/json
      description: Insere um novo produto no sistema.
      parameters:
      - description: Produto a ser inserido
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/store-manager_internal_application_DTOs.CreateProductDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Inserir um novo produto
      tags:
      - Produtos
  /products/update:
    put:
      consumes:
      - application/json
      description: Atualiza os dados de múltiplos Produtos.
      parameters:
      - description: Array de Produtos a serem atualizados
        in: body
        name: products
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.UpdateProductDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.ProductDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Atualizar Produtos
      tags:
      - Produtos
  /raw-material/delete-by-ids:
    delete:
      consumes:
      - application/json
      description: Remove várias matérias-primas do sistema utilizando seus IDs.
      parameters:
      - description: Lista de IDs das matérias-primas a serem deletadas
        in: body
        name: input
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.FindRawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Deletar matérias-primas por IDs
      tags:
      - Matéria-Prima
  /raw-material/get-all:
    get:
      consumes:
      - application/json
      description: Retorna todas as matérias-primas cadastradas no sistema em ordem
        decrescente baseado no limite de risco.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Listar todas as matérias-primas ordenadas pelo limite de risco
      tags:
      - Matéria-Prima
  /raw-material/get-by-ids:
    get:
      consumes:
      - application/json
      description: Recupera matérias-primas utilizando uma lista de IDs.
      parameters:
      - default: 8effac39-9d4d-4b20-851c-68cf0d8aae60
        description: IDs das matérias-primas (separados por vírgula)
        in: query
        name: ids
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Buscar matérias-primas por IDs
      tags:
      - Matéria-Prima
  /raw-material/insert:
    post:
      consumes:
      - application/json
      description: Insere uma ou mais matérias-primas no sistema.
      parameters:
      - description: Array de matérias-primas a serem inseridas
        in: body
        name: rawMaterials
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.CreateRawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Inserir novas matérias-primas
      tags:
      - Matéria-Prima1
  /raw-material/update:
    put:
      consumes:
      - application/json
      description: Atualiza os dados de múltiplas matérias-primas.
      parameters:
      - description: Array de matérias-primas a serem atualizadas
        in: body
        name: rawMaterials
        required: true
        schema:
          items:
            $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/store-manager_internal_application_DTOs.RawMaterialDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/store-manager_internal_application_DTOs.ErrorResponse'
      summary: Atualizar matérias-primas
      tags:
      - Matéria-Prima
swagger: "2.0"
